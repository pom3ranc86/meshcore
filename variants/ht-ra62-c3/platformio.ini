[HT_RA62_C3]
extends = esp32_base
board = airm2m_core_esp32c3
build_flags =
  ${esp32_base.build_flags}
  -I variants/ht-ra62-c3
  -D HT_RA62_C3
  -D USE_SX1262
  -D RADIO_CLASS=CustomSX1262
  -D WRAPPER_CLASS=CustomSX1262Wrapper
  -D LORA_TX_POWER=22
  -D SX126X_CURRENT_LIMIT=140
  -D SX126X_RX_BOOSTED_GAIN=1
  -D P_LORA_DIO_1=1
  -D P_LORA_TX_LED=8
  -D PIN_USER_BTN=9
  -D ESP32_CPU_FREQ=80
  -D HAS_BATTERY_MEASURE=1
build_src_filter = ${esp32_base.build_src_filter}
  +<../variants/ht-ra62-c3>
  +<helpers/sensors>
lib_deps = ${esp32_base.lib_deps}
  ESP32Async/ESPAsyncWebServer @ 3.10.3
  file://arch/esp32/AsyncElegantOTA

[env:HT_RA62_C3_repeater]
extends = HT_RA62_C3
build_flags =
  ${HT_RA62_C3.build_flags}
  -D ADVERT_NAME='"HT-RA62 Repeater"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D MAX_NEIGHBOURS=50
build_src_filter = ${HT_RA62_C3.build_src_filter}
  +<../examples/simple_repeater>
lib_deps =
  ${HT_RA62_C3.lib_deps}

[env:HT_RA62_C3_room_server]
extends = HT_RA62_C3
build_flags =
  ${HT_RA62_C3.build_flags}
  -D ADVERT_NAME='"HT-RA62 Room"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D ROOM_PASSWORD='"hello"'
build_src_filter = ${HT_RA62_C3.build_src_filter}
  +<../examples/simple_room_server>
lib_deps = ${HT_RA62_C3.lib_deps}

[env:HT_RA62_C3_terminal_chat]
extends = HT_RA62_C3
build_flags =
  ${HT_RA62_C3.build_flags}
  -D MAX_CONTACTS=100
  -D MAX_GROUP_CHANNELS=1
build_src_filter = ${HT_RA62_C3.build_src_filter}
  +<../examples/simple_secure_chat/main.cpp>
lib_deps =
  ${HT_RA62_C3.lib_deps}
  densaugeo/base64 @ ~1.4.0

[env:HT_RA62_C3_companion_radio_usb]
extends = HT_RA62_C3
build_flags = ${HT_RA62_C3.build_flags}
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=40
build_src_filter = ${HT_RA62_C3.build_src_filter}
  +<../examples/companion_radio/*.cpp>
lib_deps =
  ${HT_RA62_C3.lib_deps}
  densaugeo/base64 @ ~1.4.0

[env:HT_RA62_C3_companion_radio_ble]
extends = HT_RA62_C3
build_flags = ${HT_RA62_C3.build_flags}
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=40
  -D BLE_PIN_CODE=123456
  -D OFFLINE_QUEUE_SIZE=256
build_src_filter = ${HT_RA62_C3.build_src_filter}
  +<helpers/esp32/*.cpp>
  +<../examples/companion_radio/*.cpp>
lib_deps =
  ${HT_RA62_C3.lib_deps}
  densaugeo/base64 @ ~1.4.0

[env:HT_RA62_C3_companion_radio_wifi]
extends = HT_RA62_C3
build_flags = ${HT_RA62_C3.build_flags}
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=40
  -D WIFI_SSID='"myssid"'
  -D WIFI_PWD='"mypwd"'
  -D OFFLINE_QUEUE_SIZE=256
build_src_filter = ${HT_RA62_C3.build_src_filter}
  +<helpers/esp32/*.cpp>
  +<../examples/companion_radio/*.cpp>
lib_deps =
  ${HT_RA62_C3.lib_deps}
  densaugeo/base64 @ ~1.4.0

[env:HT_RA62_C3_sensor]
extends = HT_RA62_C3
build_flags =
  ${HT_RA62_C3.build_flags}
  -D ADVERT_NAME='"HT-RA62 Sensor"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
build_src_filter = ${HT_RA62_C3.build_src_filter}
  +<../examples/simple_sensor>
lib_deps =
  ${HT_RA62_C3.lib_deps}

[env:HT_RA62_C3_kiss_modem]
extends = HT_RA62_C3
build_src_filter = ${HT_RA62_C3.build_src_filter}
  +<../examples/kiss_modem>
lib_deps =
  ${HT_RA62_C3.lib_deps}